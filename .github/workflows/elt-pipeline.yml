name: ELT Pipeline

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running ELT pipeline tests'
        required: false
        default: 'Manual ELT pipeline test run'
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Run Ruff linter
        run: ruff check src/ tests/
      - name: Run Ruff format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile.elt', '**/docker-compose.elt.yml', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Run ELT Pipeline Tests
        run: docker compose -f docker-compose.elt.yml up --build --exit-code-from elt_tests
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elt-pipeline-report
          path: reports/elt/elt_report.html
          retention-days: 7
